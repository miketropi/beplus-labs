<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <rect fill="url(#g1)" width="400" height="200" rx="8"/>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="400" y2="200">
      <stop offset="0%" stop-color="#1E1E2E"/>
      <stop offset="50%" stop-color="#2D2D44"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="200">
      <stop offset="0%" stop-color="#CFFE25"/>
      <stop offset="100%" stop-color="#A8D815"/>
