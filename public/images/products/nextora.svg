  </defs>
  <!-- WP admin bar hint -->
  <rect y="0" width="400" height="6" fill="url(#accent)" opacity="0.4"/>
  <!-- Grid columns -->
  <g opacity="0.15">
    <rect x="20" y="40" width="110" height="130" rx="4" fill="white"/>
    <rect x="138" y="40" width="110" height="130" rx="4" fill="white"/>
    <rect x="256" y="40" width="110" height="70" rx="4" fill="white"/>
    <rect x="256" y="118" width="110" height="52" rx="4" fill="white"/>
  </g>
  <!-- Highlighted card -->
  <rect x="138" y="40" width="110" height="130" rx="4" fill="white" opacity="0.08" stroke="#CFFE25" stroke-width="1.5"/>
  <!-- Card content -->
  <rect x="148" y="55" width="90" height="8" rx="4" fill="white" opacity="0.25"/>
  <rect x="148" y="70" width="60" height="6" rx="3" fill="white" opacity="0.15"/>
  <rect x="148" y="85" width="90" height="40" rx="3" fill="#CFFE25" opacity="0.12"/>
  <circle cx="193" cy="105" r="10" fill="#CFFE25" opacity="0.3"/>
